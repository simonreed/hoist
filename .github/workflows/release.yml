name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: hoist-darwin-arm64
          - os: macos-13
            name: hoist-darwin-x86_64
          - os: ubuntu-latest
            name: hoist-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Download cloudflared for this platform
        run: sh scripts/download-cloudflared.sh

      - name: Build binary
        run: bun build --compile --minify src/cli.ts --outfile dist/${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x dist/hoist-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hoist-*
          generate_release_notes: true
